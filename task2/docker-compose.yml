services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bench-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    cpus: 1.0
    mem_limit: 1g

  redis:
    image: redis:7.4-alpine
    container_name: bench-redis
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxclients", "10000"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    cpus: 1.0
    mem_limit: 1g

  runner:
    build: .
    container_name: bench-runner
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./results:/app/results
    profiles: ["tools"]
