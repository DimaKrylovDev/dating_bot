services:
  db:
    image: postgres:16-alpine
    container_name: store-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: online_store
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d online_store"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: store-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/online_store
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      ECHO_SQL: "false"
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pg_data:
