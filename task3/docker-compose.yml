services:
  postgres:
    image: postgres:16-alpine
    container_name: cache-pg
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: bench
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d bench"]
      interval: 3s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    cpus: 1.0
    mem_limit: 1g

  redis:
    image: redis:7.4-alpine
    container_name: cache-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    cpus: 1.0
    mem_limit: 512m

  runner:
    build: .
    container_name: cache-runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PG_DSN: postgresql://bench:bench@postgres:5432/bench
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./results:/app/results
    profiles: ["tools"]
